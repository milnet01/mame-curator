# Pre-commit hooks mirror the CI gates. Run via `pre-commit run --all-files`.
# Hook versions track the project's installed tool versions (see uv.lock) so local
# behavior matches the hook sandbox. Bump together with the corresponding pyproject
# dependency to avoid drift.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.10
          - pytest>=8.3
          - types-PyYAML
          - fastapi>=0.115
          - starlette>=0.40
          - httpx>=0.27

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest-fast
        entry: uv run pytest -q -x --no-cov
        language: system
        pass_filenames: false
        types: [python]

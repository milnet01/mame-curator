name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous in-progress runs of the same workflow on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-types-test:
    name: Lint, type-check, test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: mypy
        run: uv run mypy

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src

      - name: pytest
        run: uv run pytest

      - name: API type sync (Python ↔ TS)
        run: python3 tools/check_api_types_sync.py

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  frontend-lint-types-test:
    name: Frontend lint, type-check, test
    runs-on: ubuntu-latest
    # Linux-only on purpose — the frontend pipeline (Vite, ESLint,
    # Vitest, TypeScript) is OS-agnostic; the cross-platform quirks
    # are all in the backend (Windows path semantics, macOS fsync).
    # Adding a matrix here would 3× the CI runtime for zero coverage
    # gain. See `docs/specs/DS03.md § Cluster G` for the design call.
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Source-of-truth: `engines.node` in frontend/package.json
          # (Cluster E pinned this to 24.x; Cluster G reads from
          # there so a future engines bump propagates automatically.)
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Direct binary invocation rather than gitleaks/gitleaks-action@v2.
      # The action computes a diff range as `<before>^..<after>` and breaks
      # on the first push (the first commit has no parent). Full-repo scan
      # is fast for our size and has no event-payload edge cases.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --verbose --redact --no-banner --exit-code 1

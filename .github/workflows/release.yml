name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Release runs are sequential per ref; never cancel a release in flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  # Stage 1 — re-run the full CI gate at the tagged commit.
  # If any of these fail, the publish job never runs and no Release is created.
  verify-ci:
    name: Verify CI is green at tag
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: mypy
        run: uv run mypy

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src

      - name: pytest
        run: uv run pytest

  gitleaks:
    name: Secret scan at tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Direct binary invocation rather than gitleaks/gitleaks-action@v2 — see
      # ci.yml for rationale (diff-range action breaks on first-push history).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          curl -sSfL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --verbose --redact --no-banner --exit-code 1

  # Stage 2 — build the artifact. Only runs if every verify-ci matrix job passed.
  build:
    name: Build sdist + wheel
    needs: [verify-ci, gitleaks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Stage 3 — publish the GitHub Release. Only runs if build succeeded.
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Pull the section for this version out of CHANGELOG.md.
          # Falls back to GitHub's auto-generated notes if missing.
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            /^## \[/ { in_section = ($0 ~ "\\["v"\\]"); next }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "no-changelog-section=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.no-changelog-section == 'true' && '' || 'release-notes.md' }}
          generate_release_notes: ${{ steps.notes.outputs.no-changelog-section == 'true' }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
